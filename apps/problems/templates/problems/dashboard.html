{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/htmldiff_style.css' %}">
    </head>

<body>
<div class="container py-4">
    <h1 mb-4 text-center text-md-start>My Practice Vault</h1>

    {% for category in categories %}
        <div class="mb-5">
            <h2 class="h5 text-uppercase tracking-wider text-muted mb-3 border-bottom pb-2">
                {{ category.name }}
            </h2>

            <div class="list-group list-group-flush">
                {% for problem in category.problems.all %}
                    <a href="{% url 'problem_detail' problem.slug %}" 
                       class="list-group-item list-group-item-action px-0 py-3 border-0 d-flex justify-content-between align-items-center">
                        <span class="fs-5 text-primary">{{ problem.title }}</span>
                        <i class="bi bi-chevron-right text-muted"></i> </a>
                {% empty %}
                    <p class="text-muted small italic">No problems available in this category.</p>
                {% endfor %}
            </div>
        </div>
    {% endfor %}
</div>

</body></html>
